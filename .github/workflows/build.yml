name: Build and Test (Advanced)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-sdk:
    name: Check if SDK needs rebuild
    runs-on: self-hosted
    outputs:
      needs-rebuild: ${{ steps.check.outputs.needs-rebuild }}
      configure-hash: ${{ steps.check.outputs.configure-hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Check SDK status
        id: check
        shell: powershell
        run: |
          try {
            $configureHash = (Get-FileHash configure.py).Hash
            Write-Output "configure-hash=$configureHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            
            $sdkDir = "SDK"
            $hashFile = Join-Path $sdkDir ".configure_hash"
            $binariesDir = "Binaries"
            
            $needsRebuild = $false
            
            # Check if hash file exists and matches
            if (Test-Path -Path $hashFile) {
              $storedHash = (Get-Content $hashFile -Raw).Trim()
              if ($storedHash -ne $configureHash) {
                Write-Output "configure.py changed, SDK rebuild required"
                $needsRebuild = $true
              } else {
                Write-Output "configure.py unchanged"
              }
            } else {
              Write-Output "No hash file found"
              $needsRebuild = $true
            }
            
            # Check if SDK binaries exist
            $hasDebugBinaries = Test-Path -Path (Join-Path $binariesDir "Debug/bin")
            $hasReleaseBinaries = Test-Path -Path (Join-Path $binariesDir "Release/bin")
            
            if (-not $hasDebugBinaries -or -not $hasReleaseBinaries) {
              Write-Output "Missing binaries"
              $needsRebuild = $true
            }
            
            if ($needsRebuild) {
              Write-Output "needs-rebuild=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "SDK rebuild needed"
            } else {
              Write-Output "needs-rebuild=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "SDK is up to date"
            }
          } catch {
            Write-Error "Error checking SDK: $_"
            exit 1
          }

  build-sdk:
    name: Build SDK - ${{ matrix.build-variant }}
    needs: check-sdk
    if: needs.check-sdk.outputs.needs-rebuild == 'true'
    runs-on: self-hosted
    strategy:
      matrix:
        build-variant: [Debug, Release]
      max-parallel: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Restore submodule cache
        uses: actions/cache@v3
        with:
          path: |
            external/
          key: submodules-cache-${{ hashFiles('.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            submodules-cache-${{ hashFiles('.gitmodules') }}-
            submodules-cache-

      - name: Setup MSVC Build Tools
        shell: cmd
        run: |
          REM Try to find and initialize Visual Studio environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo Visual Studio not found at expected locations
            exit /b 1
          )

      - name: Clean previous build artifacts
        shell: powershell
        run: |
          $variantDir = "Binaries/${{ matrix.build-variant }}"
          if (Test-Path -Path $variantDir) {
            Write-Output "Cleaning $variantDir"
            Remove-Item -Recurse -Force $variantDir
          }

      - name: Build SDK - ${{ matrix.build-variant }}
        shell: cmd
        run: |
          REM Initialize Visual Studio environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          REM Build SDK
          echo Building OpenUSD SDK with variant: ${{ matrix.build-variant }}
          python configure.py --library openusd --build_variant ${{ matrix.build-variant }}
          if %ERRORLEVEL% neq 0 (
            echo Build failed with error code %ERRORLEVEL%
            exit /b %ERRORLEVEL%
          )

      - name: Verify build output
        shell: powershell
        run: |
          try {
            $binDir = "Binaries/${{ matrix.build-variant }}"
            if (Test-Path -Path $binDir) {
              $fileCount = (Get-ChildItem -Path $binDir -Recurse -ErrorAction SilentlyContinue | Measure-Object).Count
              Write-Output "Build successful - $fileCount files in $binDir"
            } else {
              Write-Output "ERROR: Build directory not found!"
              exit 1
            }
          } catch {
            Write-Error "Error verifying build: $_"
            exit 1
          }

  pack-and-upload-sdk:
    name: Pack SDK and upload
    needs: build-sdk
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify all binaries are present
        shell: powershell
        run: |
          $debugBin = Test-Path -Path "Binaries/Debug/bin"
          $releaseBin = Test-Path -Path "Binaries/Release/bin"
          
          Write-Output "Debug binaries present: $debugBin"
          Write-Output "Release binaries present: $releaseBin"
          
          if (-not $debugBin -or -not $releaseBin) {
            Write-Output "ERROR: Missing binaries!"
            exit 1
          }

      - name: Pack SDK
        shell: powershell
        run: |
          Write-Output "Packing SDK..."
          python configure.py --pack
          
          if (Test-Path -Path "SDK/SDK.zip") {
            $size = (Get-Item "SDK/SDK.zip").Length / 1GB
            Write-Output "SDK.zip packed successfully - Size: $([Math]::Round($size, 2)) GB"
          } else {
            Write-Output "ERROR: SDK.zip not created!"
            exit 1
          }

      - name: Store configure hash
        shell: powershell
        run: |
          try {
            $configureHash = (Get-FileHash configure.py).Hash
            $hashFile = "SDK/.configure_hash"
            if (-not (Test-Path -Path "SDK")) {
              New-Item -ItemType Directory -Path "SDK" -Force | Out-Null
            }
            $configureHash | Out-File -FilePath $hashFile -Encoding UTF8 -NoNewline
            Write-Output "Hash saved: $configureHash"
          } catch {
            Write-Error "Error storing hash: $_"
            exit 1
          }

      - name: Create release artifacts
        shell: powershell
        run: |
          Write-Output "Creating archive for release..."
          $archivePath = "SDK-${{ github.sha }}.zip"
          
          # Since SDK.zip is already compressed, just copy it
          Copy-Item -Path "SDK/SDK.zip" -Destination $archivePath
          
          if (Test-Path -Path $archivePath) {
            $size = (Get-Item $archivePath).Length / 1GB
            Write-Output "Archive created - Size: $([Math]::Round($size, 2)) GB"
          }

      - name: Upload SDK to GitHub release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sdk-release
          path: SDK-*.zip
          retention-days: 90

      - name: Upload SDK for workflow
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: SDK/SDK.zip
          retention-days: 7

  restore-sdk:
    name: Restore or build SDK
    needs: [check-sdk, pack-and-upload-sdk]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Download SDK if rebuilt
        if: needs.check-sdk.outputs.needs-rebuild == 'true'
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: SDK/

      - name: Restore SDK from cache
        shell: powershell
        run: |
          try {
            $sdkZip = "SDK/SDK.zip"
            if (Test-Path -Path $sdkZip) {
              Write-Output "Extracting SDK.zip..."
              Expand-Archive -Path $sdkZip -DestinationPath "SDK/" -Force
              Write-Output "SDK restored successfully"
            } else {
              Write-Output "SDK.zip not found, checking for existing binaries..."
              if ((Test-Path -Path "Binaries/Debug/bin") -and (Test-Path -Path "Binaries/Release/bin")) {
                Write-Output "Existing binaries found, no extraction needed"
              } else {
                Write-Output "ERROR: No SDK available"
                exit 1
              }
            }
          } catch {
            Write-Error "Error restoring SDK: $_"
            exit 1
          }

  build-without-cuda:
    name: Build Project (No CUDA)
    needs: restore-sdk
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: powershell
        run: |
          try {
            python -m pip install --upgrade pip
            if (Test-Path -Path "requirements.txt") {
              pip install -r requirements.txt
            }
          } catch {
            Write-Error "Error installing dependencies: $_"
            exit 1
          }

      - name: Setup MSVC Build Tools
        shell: cmd
        run: |
          REM Try to find and initialize Visual Studio environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Community edition
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Professional edition
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Enterprise edition
          ) else (
            echo WARNING: Visual Studio not found at expected locations
            echo Continuing anyway - system PATH may have compiler
          )

      - name: Configure CMake (No CUDA)
        shell: cmd
        run: |
          REM Initialize MSVC environment first
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          REM Configure CMake
          set buildDir=build_nocuda
          if exist "%buildDir%" (
            rmdir /s /q "%buildDir%"
          )
          mkdir "%buildDir%"
          cd /d "%buildDir%"
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_CUDA=OFF ^
            -DCMAKE_INSTALL_PREFIX="../install_nocuda" ^
            ..
          
          if %ERRORLEVEL% neq 0 (
            echo CMake configuration failed
            exit /b %ERRORLEVEL%
          )

      - name: Build (No CUDA)
        shell: cmd
        run: |
          REM Initialize MSVC environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          cd /d build_nocuda
          cmake --build . --config Release -j
          if %ERRORLEVEL% neq 0 (
            echo Build failed
            exit /b %ERRORLEVEL%
          )

      - name: Install (No CUDA)
        shell: cmd
        run: |
          REM Initialize MSVC environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          cd /d build_nocuda
          cmake --install .
          if %ERRORLEVEL% neq 0 (
            echo Install failed
            exit /b %ERRORLEVEL%
          )

      - name: Upload build artifacts (No CUDA)
        uses: actions/upload-artifact@v4
        with:
          name: project-build-nocuda
          path: install_nocuda/
          retention-days: 7

  build-with-cuda:
    name: Build Project (With CUDA)
    needs: restore-sdk
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: powershell
        run: |
          try {
            python -m pip install --upgrade pip
            if (Test-Path -Path "requirements.txt") {
              pip install -r requirements.txt
            }
          } catch {
            Write-Error "Error installing dependencies: $_"
            exit 1
          }

      - name: Check CUDA availability
        id: cuda-check
        shell: powershell
        run: |
          try {
            if (Test-Path -Env:CUDA_PATH) {
              Write-Output "cuda-available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "CUDA_PATH: $env:CUDA_PATH"
              & "$env:CUDA_PATH\bin\nvcc.exe" --version
            } else {
              Write-Output "cuda-available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Output "CUDA_PATH not found"
            }
          } catch {
            Write-Output "cuda-available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Output "CUDA check error: $_"
          }

      - name: Setup MSVC Build Tools
        shell: cmd
        run: |
          REM Try to find and initialize Visual Studio environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Community edition
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Professional edition
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            echo MSVC environment initialized from Enterprise edition
          ) else (
            echo WARNING: Visual Studio not found at expected locations
            echo Continuing anyway - system PATH may have compiler
          )

      - name: Configure CMake (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          REM Initialize MSVC environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          set buildDir=build_cuda
          if exist "%buildDir%" (
            rmdir /s /q "%buildDir%"
          )
          mkdir "%buildDir%"
          cd /d "%buildDir%"
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DENABLE_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES=75;86;89 ^
            -DCMAKE_INSTALL_PREFIX="../install_cuda" ^
            ..
          
          if %ERRORLEVEL% neq 0 (
            echo CMake configuration failed
            exit /b %ERRORLEVEL%
          )

      - name: Build (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          REM Initialize MSVC environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          cd /d build_cuda
          cmake --build . --config Release -j
          if %ERRORLEVEL% neq 0 (
            echo Build failed
            exit /b %ERRORLEVEL%
          )

      - name: Install (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        shell: cmd
        run: |
          REM Initialize MSVC environment
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
          ) else if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )
          
          cd /d build_cuda
          cmake --install .
          if %ERRORLEVEL% neq 0 (
            echo Install failed
            exit /b %ERRORLEVEL%
          )

      - name: CUDA not available
        if: steps.cuda-check.outputs.cuda-available == 'false'
        shell: powershell
        run: |
          Write-Output "CUDA is not available on this runner"
          Write-Output "Skipping CUDA build"

      - name: Upload build artifacts (With CUDA)
        if: steps.cuda-check.outputs.cuda-available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: project-build-cuda
          path: install_cuda/
          retention-days: 7

  summary:
    name: Build Summary
    needs: [build-without-cuda, build-with-cuda]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print summary
        shell: powershell
        run: |
          try {
            Write-Output ""
            Write-Output "======================================"
            Write-Output "           BUILD SUMMARY"
            Write-Output "======================================"
            Write-Output "No CUDA build: ${{ needs.build-without-cuda.result }}"
            Write-Output "CUDA build:    ${{ needs.build-with-cuda.result }}"
            Write-Output "======================================"
            Write-Output ""
            
            if ("${{ needs.build-without-cuda.result }}" -eq "success" -and "${{ needs.build-with-cuda.result }}" -eq "success") {
              Write-Output "✓ Both builds completed successfully"
              exit 0
            } else {
              Write-Output "✗ Some builds failed"
              exit 1
            }
          } catch {
            Write-Error "Error in summary: $_"
            exit 1
          }
